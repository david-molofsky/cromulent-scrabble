<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cromulent Scrabble</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Inter',sans-serif;}
.app{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;}
.title{font-family:'Playfair Display',serif;font-size:2rem;color:#f5a623;letter-spacing:0.02em;text-align:center;margin-bottom:4px;}
.subtitle{color:#8892a4;font-size:0.78rem;text-align:center;margin-bottom:20px;letter-spacing:0.08em;text-transform:uppercase;}
.card{background:#0f3460;border-radius:12px;padding:20px;margin-bottom:16px;width:100%;max-width:520px;}
.label{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:#8892a4;margin-bottom:6px;}
input,textarea{width:100%;background:#16213e;border:1px solid #1e3a5f;border-radius:8px;color:#e0e0e0;padding:10px 12px;font-size:0.9rem;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s;}
input:focus,textarea:focus{border-color:#e94560;}
textarea{resize:vertical;min-height:64px;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-size:0.88rem;font-weight:600;font-family:'Inter',sans-serif;transition:opacity 0.15s,transform 0.1s;}
.btn:active{transform:scale(0.97);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-primary{background:#e94560;color:white;}
.btn-gold{background:#f5a623;color:#1a1000;}
.btn-ghost{background:transparent;color:#8892a4;border:1px solid #1e3a5f;}
.btn-approve{background:#27ae60;color:white;}
.btn-reject{background:#c0392b;color:white;}
.btn-dict{background:#2c1654;color:#c39bd3;border:1px solid #6c3483;}
.btn-sm{padding:6px 12px;font-size:0.8rem;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.board-wrap{overflow-x:auto;margin-bottom:12px;}
.board{display:grid;grid-template-columns:repeat(15,38px);grid-template-rows:repeat(15,38px);gap:2px;background:#0d2137;border:2px solid #0f3460;border-radius:8px;padding:6px;}
.cell{width:38px;height:38px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;cursor:default;user-select:none;transition:background 0.1s;border:1px solid #1e3a5f;background:#16213e;color:#8892a4;}
.cell.ctr{border-color:#e94560;color:#e94560;}
.cell.sp-dm{background:#08200f;border-color:#3cc864;color:#fff;}
.cell.sp-dl{background:#082228;border-color:#00d0d0;color:#fff;}
.cell.sp-cw{background:#1c1604;border-color:#ffa500;color:#fff;}
.cell.sp-ac{background:#260828;border-color:#e650f0;color:#fff;}
.sq-badge.ac{background:#260828;color:#e650f0;border:1px solid #e650f0;}
.cell.has-tile{background:#f0d080;color:#2a1a00;border-color:#b89030;box-shadow:0 2px 0 #b89030;}
.cell.staged{background:#7ec8e3;color:#2a1a00;border-color:#3a8aaa;box-shadow:0 2px 0 #3a8aaa;cursor:pointer;}
.rack{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;min-height:48px;}
.tile{width:44px;height:44px;border-radius:6px;background:#f0d080;color:#2a1a00;font-size:1rem;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;border:none;box-shadow:0 3px 0 #b89030;transition:transform 0.1s,box-shadow 0.1s;}
.tile:hover{transform:translateY(-2px);box-shadow:0 5px 0 #b89030;}
.tile.selected{background:#7ec8e3;box-shadow:0 3px 0 #3a8aaa;transform:translateY(-4px);}
.tile.used{opacity:0.3;cursor:not-allowed;}
.scoreboard{display:flex;gap:12px;margin-bottom:14px;}
.score-card{flex:1;background:#16213e;border-radius:8px;padding:10px 14px;border:2px solid transparent;}
.score-card.active{border-color:#f5a623;}
.score-name{font-size:0.78rem;color:#8892a4;margin-bottom:2px;text-transform:uppercase;letter-spacing:0.05em;}
.score-val{font-size:1.6rem;font-family:'Playfair Display',serif;color:#f5a623;}
.score-turn{font-size:0.7rem;color:#e94560;font-weight:600;margin-top:2px;}
.log{max-height:140px;overflow-y:auto;background:#16213e;border-radius:8px;padding:10px;font-size:0.78rem;}
.log-entry{padding:3px 0;border-bottom:1px solid #1e3a5f;color:#8892a4;}
.log-entry:last-child{border-bottom:none;}
.warning{background:rgba(245,166,35,0.15);border:1px solid #f5a623;border-radius:8px;padding:10px 12px;font-size:0.82rem;color:#f5a623;margin-bottom:10px;}
.error{background:rgba(233,69,96,0.15);border:1px solid #e94560;border-radius:8px;padding:10px 12px;font-size:0.82rem;color:#e94560;margin-bottom:10px;}
.info{background:rgba(126,200,227,0.1);border:1px solid #7ec8e3;border-radius:8px;padding:10px 12px;font-size:0.82rem;color:#7ec8e3;margin-bottom:10px;}
.debug{background:#0a1628;border:1px solid #1e3a5f;border-radius:8px;padding:8px 12px;font-size:0.72rem;color:#7ec8e3;margin-bottom:10px;font-family:monospace;word-break:break-all;}
.sec{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:#8892a4;margin-bottom:8px;margin-top:14px;}
.sec:first-child{margin-top:0;}
.pending-word{font-family:'Playfair Display',serif;font-size:1.5rem;color:#f5a623;letter-spacing:0.15em;margin-bottom:4px;}
.pending-def{font-style:italic;color:#e0e0e0;font-size:0.9rem;margin-bottom:4px;}
.pending-ex{color:#8892a4;font-size:0.85rem;}
.sq-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:0.72rem;font-weight:700;margin-bottom:8px;}
.sq-badge.dm{background:#08200f;color:#3cc864;border:1px solid #3cc864;}
.sq-badge.dl{background:#082228;color:#00d0d0;border:1px solid #00d0d0;}
.sq-badge.cw{background:#1c1604;color:#ffa500;border:1px solid #ffa500;}
.divider{height:1px;background:#1e3a5f;margin:14px 0;}
.row{display:flex;align-items:center;gap:8px;}
.spacer{flex:1;}
.game-over{text-align:center;padding:30px 20px;}
.game-over-title{font-family:'Playfair Display',serif;font-size:2rem;color:#f5a623;margin-bottom:8px;}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.leg{display:flex;align-items:center;gap:5px;font-size:0.7rem;color:#8892a4;}
.leg-sq{width:16px;height:16px;border-radius:3px;flex-shrink:0;}

/* ── Dictionary panel ── */
.dict-overlay{position:fixed;inset:0;background:rgba(10,14,30,0.82);z-index:100;display:flex;flex-direction:column;align-items:center;padding:16px;overflow-y:auto;}
.dict-panel{background:#0f1e3a;border:1px solid #1e3a5f;border-radius:14px;width:100%;max-width:560px;padding:20px;}
.dict-header{display:flex;align-items:center;margin-bottom:14px;}
.dict-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:#c39bd3;flex:1;}
.dict-count{font-size:0.75rem;color:#8892a4;margin-right:12px;}
.dict-search{width:100%;background:#16213e;border:1px solid #1e3a5f;border-radius:8px;color:#e0e0e0;padding:9px 12px;font-size:0.88rem;font-family:'Inter',sans-serif;outline:none;margin-bottom:14px;}
.dict-search:focus{border-color:#c39bd3;}
.dict-empty{color:#8892a4;font-size:0.85rem;text-align:center;padding:30px 0;}
.dict-entry{background:#16213e;border-radius:10px;padding:14px 16px;margin-bottom:10px;border-left:3px solid #2c1654;}
.dict-entry.dm{border-left-color:#3cc864;}
.dict-entry.dl{border-left-color:#00d0d0;}
.dict-entry.cw{border-left-color:#ffa500;}
.dict-entry.ac{border-left-color:#e650f0;}
.dict-word{font-family:'Playfair Display',serif;font-size:1.3rem;color:#f5a623;letter-spacing:0.1em;}
.dict-meta{font-size:0.7rem;color:#8892a4;margin-bottom:6px;margin-top:2px;}
.dict-def{font-style:italic;color:#e0e0e0;font-size:0.88rem;margin-bottom:3px;}
.dict-def2{font-style:italic;color:#c0c8d8;font-size:0.85rem;margin-bottom:3px;}
.dict-ex{color:#8892a4;font-size:0.82rem;}
.dict-cw-note{font-size:0.75rem;color:#e67e22;margin-bottom:4px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const FIREBASE_URL="https://cromulent-scrabble-default-rtdb.europe-west1.firebasedatabase.app";

async function fbGet(p){
  try{const r=await fetch(`${FIREBASE_URL}/${p}.json`);const data=await r.json();return{ok:r.ok,status:r.status,data};}
  catch(e){return{ok:false,status:0,data:null,err:e.message};}
}
async function fbSet(p,v){
  try{const r=await fetch(`${FIREBASE_URL}/${p}.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});const data=await r.json();return{ok:r.ok,status:r.status,data};}
  catch(e){return{ok:false,status:0,err:e.message};}
}
async function loadGame(c){return fbGet(`crom-${c}`);}
async function saveGame(c,s){return fbSet(`crom-${c}`,s);}

// Firebase serialises JS arrays as objects with numeric string keys.
// This converts them back to real arrays recursively.
function toArr(v){
  if(v===null||v===undefined)return v;
  if(Array.isArray(v))return v.map(toArr);
  if(typeof v==='object'){
    const keys=Object.keys(v);
    // Empty object {} that represented an empty array — return []
    if(keys.length===0)return[];
    if(keys.every(k=>/^\d+$/.test(k))){
      const maxIdx=Math.max(...keys.map(Number));
      if(!isFinite(maxIdx))return[];
      const arr=new Array(maxIdx+1).fill(null);
      for(const k of keys)arr[parseInt(k)]=toArr(v[k]);
      return arr;
    }
    const out={};for(const k of keys)out[k]=toArr(v[k]);return out;
  }
  return v;
}
function normaliseGame(data){
  if(!data||data.waiting)return data;
  // Normalise board: must be 15x15 array of null or {letter,...}
  let board=toArr(data.board);
  if(!Array.isArray(board)){board=Array.from({length:15},()=>Array(15).fill(null));}
  board=board.map(row=>{
    if(!Array.isArray(row))return Array(15).fill(null);
    // Firebase drops trailing nulls; pad to full 15-column width
    const full=Array(15).fill(null);
    for(let i=0;i<15;i++)full[i]=(row[i]&&typeof row[i]==='object'&&row[i].letter)?row[i]:null;
    return full;
  });
  // Firebase also drops trailing null rows — pad to exactly 15 rows
  while(board.length<15)board.push(Array(15).fill(null));
  // Normalise players — Firebase can serialise both the players array AND each
  // player's rack sub-array as a keyed object, so we must toArr() both levels.
  const rawPlayers=toArr(data.players)||[];
  const players=rawPlayers.map(p=>{
    if(!p)return p;
    return{...p,rack:Array.isArray(p.rack)?p.rack:toArr(p.rack)||[]};
  });
  return{
    ...data,
    board,
    players,
    bag:toArr(data.bag)||[],
    log:toArr(data.log)||[],
    dictionary:toArr(data.dictionary)||[],
    pending:data.pending?{
      ...data.pending,
      tiles:toArr(data.pending.tiles)||[],
      scoreBreakdown:toArr(data.pending.scoreBreakdown)||[],
    }:null,
  };
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e.message};}
  render(){
    if(this.state.err)return(
      <div style={{padding:20,background:"#1a1a2e",minHeight:"100vh",color:"#e94560",fontFamily:"monospace"}}>
        <div style={{fontSize:"1rem",marginBottom:8,color:"#f5a623"}}>Something went wrong — please share this with the developer:</div>
        <div style={{background:"#0a1628",padding:12,borderRadius:8,fontSize:"0.8rem",wordBreak:"break-all"}}>{this.state.err}</div>
        <button onClick={()=>window.location.reload()} style={{marginTop:16,padding:"8px 16px",background:"#e94560",color:"white",border:"none",borderRadius:8,cursor:"pointer"}}>Reload</button>
      </div>
    );
    return this.props.children;
  }
}

// ── Special squares ──────────────────────────────────────────────────────────
const SZ=15,CEN=7;
// Special squares — Scrabble-position-derived, 8-way symmetric, 4 types.
// CW:8  DM:12  DL:16  AC:12  (48 total)
// G3 (diag step-1) and G10 (outer edge scatter) are plain — buffer around CW corners.
// No AC square is adjacent to any CW square.
const SPECIALS=new Map([
  // G1 corners → CW (×4)
  ...[[0,0],[0,14],[14,0],[14,14]].map(([r,c])=>[`${r},${c}`,'cw']),
  // G2 edge midpoints → CW (×4)
  ...[[0,7],[7,0],[7,14],[14,7]].map(([r,c])=>[`${r},${c}`,'cw']),
  // G3 diagonal step-1 → plain (buffer near CW corners — omitted)
  // G4 diagonal step-2 → DM (×4)
  ...[[2,2],[2,12],[12,2],[12,12]].map(([r,c])=>[`${r},${c}`,'dm']),
  // G5 diagonal step-3 → AC (×4)
  ...[[3,3],[3,11],[11,3],[11,11]].map(([r,c])=>[`${r},${c}`,'ac']),
  // G6 cross arms → DL (×4)
  ...[[3,7],[7,3],[7,11],[11,7]].map(([r,c])=>[`${r},${c}`,'dl']),
  // G7 diagonal step-4 → DL (×4)
  ...[[4,4],[4,10],[10,4],[10,10]].map(([r,c])=>[`${r},${c}`,'dl']),
  // G8 inner diagonal → AC (×4)
  ...[[5,5],[5,9],[9,5],[9,9]].map(([r,c])=>[`${r},${c}`,'ac']),
  // G9 centre-adjacent → AC (×4)
  ...[[6,6],[6,8],[8,6],[8,8]].map(([r,c])=>[`${r},${c}`,'ac']),
  // G10 outer edge scatter → plain (buffer near CW — omitted)
  // G11 mid scatter → DL (×8)
  ...[[1,5],[1,9],[5,1],[5,13],[9,1],[9,13],[13,5],[13,9]].map(([r,c])=>[`${r},${c}`,'dl']),
  // G12 inner scatter → DM (×8)
  ...[[2,6],[2,8],[6,2],[6,12],[8,2],[8,12],[12,6],[12,8]].map(([r,c])=>[`${r},${c}`,'dm']),
]);
function getSpecial(r,c){return SPECIALS.get(`${r},${c}`)||null;}

// ── Tiles ────────────────────────────────────────────────────────────────────
const TILE_DIST={A:9,B:2,C:2,D:4,E:12,F:2,G:3,H:2,I:9,J:1,K:1,L:4,M:2,N:6,O:8,P:2,Q:2,R:6,S:4,T:6,U:4,V:2,W:2,X:1,Y:2,Z:2};
function buildBag(){const b=[];for(const[l,n]of Object.entries(TILE_DIST))for(let i=0;i<n;i++)b.push(l);for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function drawTiles(bag,n){return{drawn:bag.slice(0,n),remaining:bag.slice(n)};}

// ── Pronounceability ─────────────────────────────────────────────────────────
const VOWELS=new Set(["A","E","I","O","U"]);
function pronounceable(word){
  if(word.length<4)return false;
  const u=word.toUpperCase();let c=0,v=0;
  for(const ch of u){if(VOWELS.has(ch)){c=0;v++;}else{v=0;c++;}if(c>=4||v>=4)return false;}
  return[...u].some(x=>VOWELS.has(x));
}

// ── Board helpers ────────────────────────────────────────────────────────────
function emptyBoard(){return Array.from({length:SZ},()=>Array(SZ).fill(null));}

function bget(board,r,c){
  // Safe board accessor — guards against missing rows/cols after Firebase deserialisation
  if(!board||!Array.isArray(board[r]))return null;
  const cell=board[r][c];
  return(cell&&typeof cell==='object'&&cell.letter)?cell:null;
}

function analysePlay(board,placed){
  if(!placed.length)return null;
  const rows=[...new Set(placed.map(t=>t.r))],cols=[...new Set(placed.map(t=>t.c))];
  if(rows.length>1&&cols.length>1)return null;
  const isFirst=board.flat().every(c=>c===null);
  // Build overlay using safe accessor
  const ov=Array.from({length:SZ},(_,r)=>Array.from({length:SZ},(_,c)=>bget(board,r,c)));
  for(const{r,c,letter}of placed){if(ov[r][c]!==null)return null;ov[r][c]={letter,r,c};}
  const horiz=rows.length===1;
  let main;
  if(horiz){
    const r=rows[0],mn=Math.min(...cols),mx=Math.max(...cols);
    let s=mn;while(s>0&&ov[r][s-1])s--;
    let e=mx;while(e<SZ-1&&ov[r][e+1])e++;
    main=[];for(let c=s;c<=e;c++){if(!ov[r][c])return null;main.push({r,c,letter:ov[r][c].letter,isNew:placed.some(p=>p.r===r&&p.c===c)});}
  }else{
    const c=cols[0],mn=Math.min(...rows),mx=Math.max(...rows);
    let s=mn;while(s>0&&ov[s-1][c])s--;
    let e=mx;while(e<SZ-1&&ov[e+1][c])e++;
    main=[];for(let r=s;r<=e;r++){if(!ov[r][c])return null;main.push({r,c,letter:ov[r][c].letter,isNew:placed.some(p=>p.r===r&&p.c===c)});}
  }
  if(main.length<4)return null;
  for(const{r,c,isNew}of main){
    if(!isNew)continue;
    if(horiz){let s=r;while(s>0&&ov[s-1][c])s--;let e=r;while(e<SZ-1&&ov[e+1][c])e++;if(e>s)return null;}
    else{let s=c;while(s>0&&ov[r][s-1])s--;let e=c;while(e<SZ-1&&ov[r][e+1])e++;if(e>s)return null;}
  }
  if(isFirst){if(!placed.some(t=>t.r===CEN&&t.c===CEN))return null;}
  else if(!placed.some(({r,c})=>bget(board,r-1,c)||bget(board,r+1,c)||bget(board,r,c-1)||bget(board,r,c+1)))return null;

  let dlSquare=null;
  for(const{r,c,isNew}of main){if(isNew&&getSpecial(r,c)==='dl'){dlSquare={r,c,letter:ov[r][c].letter};break;}}

  let effectiveWord=main.map(t=>t.letter).join("");
  if(dlSquare){
    const idx=main.findIndex(t=>t.r===dlSquare.r&&t.c===dlSquare.c);
    effectiveWord=effectiveWord.slice(0,idx+1)+dlSquare.letter+effectiveWord.slice(idx+1);
  }

  let crossedWord=null;
  for(const{r,c,isNew}of main){
    if(!isNew&&getSpecial(r,c)==='cw'){
      if(horiz){let s=r;while(s>0&&bget(board,s-1,c))s--;let e=r;while(e<SZ-1&&bget(board,e+1,c))e++;if(e>s){const letters=[];for(let rr=s;rr<=e;rr++)letters.push(bget(board,rr,c).letter);crossedWord={word:letters.join(""),def:bget(board,r,c)?.definition||null};}}
      else{let s=c;while(s>0&&bget(board,r,s-1))s--;let e=c;while(e<SZ-1&&bget(board,r,e+1))e++;if(e>s){const letters=[];for(let cc=s;cc<=e;cc++)letters.push(bget(board,r,cc).letter);crossedWord={word:letters.join(""),def:bget(board,r,c)?.definition||null};}}
      break;
    }
  }
  if(!crossedWord){
    for(const{r,c,isNew}of main){
      if(isNew&&getSpecial(r,c)==='cw'){
        if(horiz){let s=r;while(s>0&&bget(board,s-1,c))s--;let e=r;while(e<SZ-1&&bget(board,e+1,c))e++;if(e>s){const letters=[];for(let rr=s;rr<=e;rr++)letters.push((bget(board,rr,c)||{letter:ov[rr][c].letter}).letter);crossedWord={word:letters.join(""),def:null};}}
        else{let s=c;while(s>0&&bget(board,r,s-1))s--;let e=c;while(e<SZ-1&&bget(board,r,e+1))e++;if(e>s){const letters=[];for(let cc=s;cc<=e;cc++)letters.push((bget(board,r,cc)||{letter:ov[r][cc].letter}).letter);crossedWord={word:letters.join(""),def:null};}}
        break;
      }
    }
  }

  let squareType=null;
  for(const{r,c,isNew}of main){if(isNew){const sp=getSpecial(r,c);if(sp){squareType=sp;break;}}}

  // ── Scoring (Option E) ───────────────────────────────────────────────────
  // Base: 1pt per NEW tile placed (not pre-existing board tiles)
  const newTileCount=main.filter(t=>t.isNew).length;
  let score=newTileCount;
  let scoreBreakdown=[`${newTileCount} new tile${newTileCount!==1?'s':''}`];
  if(squareType==='dm'){
    score+=3;
    scoreBreakdown.push('+3 Double Meaning');
  }else if(squareType==='dl'){
    score+=2;
    scoreBreakdown.push('+2 Double Letter');
  }else if(squareType==='cw'&&crossedWord){
    const cwBonus=crossedWord.word.length;
    score+=cwBonus;
    scoreBreakdown.push(`+${cwBonus} crossed word length`);
  }else if(squareType==='ac'){
    score+=newTileCount; // +1 per letter (doubles the base)
    scoreBreakdown.push(`+${newTileCount} Acronym bonus`);
  }

  return{wordTiles:main,effectiveWord,dlSquare,crossedWord,squareType,score,scoreBreakdown};
}

// ── Validation ───────────────────────────────────────────────────────────────
function wordInSentence(word,sentence){return new RegExp(`(^|[^a-z])${word.toLowerCase()}([^a-z]|$)`).test(sentence.toLowerCase());}
function wcount(s){return s.trim().split(/\s+/).filter(Boolean).length;}
async function checkRealWord(w){try{const r=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${w.toLowerCase()}`);return r.ok;}catch{return false;}}

// ── Game state ───────────────────────────────────────────────────────────────
function createGame(p1,p2){
  const bag=buildBag();
  const{drawn:r1,remaining:b1}=drawTiles(bag,7);
  const{drawn:r2,remaining:b2}=drawTiles(b1,7);
  return{v:3,players:[{name:p1,rack:r1,score:0,usedExchange:false},{name:p2,rack:r2,score:0,usedExchange:false}],bag:b2,board:emptyBoard(),turn:0,phase:"playing",pending:null,log:[],dictionary:[],winner:null};
}

// ── Dictionary panel ─────────────────────────────────────────────────────────
function DictionaryPanel({dictionary,players,onClose}){
  const[search,setSearch]=useState("");
  const filtered=[...(dictionary||[])].filter(e=>{
    if(!search.trim())return true;
    const q=search.toLowerCase();
    return e.word.toLowerCase().includes(q)||e.definition.toLowerCase().includes(q)||(e.definition2&&e.definition2.toLowerCase().includes(q));
  }).sort((a,b)=>a.word.localeCompare(b.word));

  return(
    <div className="dict-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="dict-panel">
        <div className="dict-header">
          <div className="dict-title">📖 Cromulent Dictionary</div>
          <span className="dict-count">{(dictionary||[]).length} word{(dictionary||[]).length!==1?"s":""}</span>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕ Close</button>
        </div>
        <input className="dict-search" placeholder="Search words or definitions…" value={search} onChange={e=>setSearch(e.target.value)} autoFocus/>
        {filtered.length===0&&<div className="dict-empty">{(dictionary||[]).length===0?"No words yet — play some!":"No matches found."}</div>}
        {filtered.map((entry,i)=>(
          <div key={i} className={`dict-entry${entry.squareType?" "+entry.squareType:""}`}>
            <div className="row" style={{marginBottom:4}}>
              <div className="dict-word">{entry.compoundWord||entry.word}</div>
              {entry.squareType&&<span className={`sq-badge ${entry.squareType}`} style={{marginBottom:0,marginLeft:8}}>
                {entry.squareType==='dm'?"⊕ DM":entry.squareType==='dl'?"✦ DL":entry.squareType==='ac'?"🔤 AC":"⊞ CW"}
              </span>}
            </div>
            <div className="dict-meta">
              played by {players[entry.playedBy]?.name||"?"} · turn {entry.turnNumber}
              {entry.score&&<span> · {entry.score} pts</span>}
            </div>
            {entry.squareType==='cw'&&entry.crossedWord&&(
              <div className="dict-cw-note">Built on: <strong>{entry.crossedWord.word}</strong>{entry.crossedWord.def?` — "${entry.crossedWord.def}"`:""}</div>
            )}
            <div className="dict-def">"{entry.definition}"</div>
            {entry.definition2&&<div className="dict-def2">Also: "{entry.definition2}"</div>}
            <div className="dict-ex">e.g. {entry.example}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App(){
  const[screen,setScreen]=useState("lobby");
  const[roomCode,setRoomCode]=useState("");
  const[playerName,setPlayerName]=useState("");
  const[pidx,setPidx]=useState(null);
  const[game,setGame]=useState(null);
  const[joining,setJoining]=useState(false);
  const[lobbyErr,setLobbyErr]=useState("");
  const[debug,setDebug]=useState("");
  const[staged,setStaged]=useState([]);
  const[selTile,setSelTile]=useState(null);
  const[def1,setDef1]=useState("");
  const[def2,setDef2]=useState("");
  const[example,setExample]=useState("");
  const[submitting,setSubmitting]=useState(false);
  const[gameErr,setGameErr]=useState("");
  const[realWarn,setRealWarn]=useState("");
  const[showXch,setShowXch]=useState(false);
  const[xchSel,setXchSel]=useState([]);
  const[analysis,setAnalysis]=useState(null);
  const[showDict,setShowDict]=useState(false);
  // Lobby dictionary viewer
  const[lobbyDictCode,setLobbyDictCode]=useState("");
  const[lobbyDictData,setLobbyDictData]=useState(null);
  const[lobbyDictPlayers,setLobbyDictPlayers]=useState([]);
  const[lobbyDictErr,setLobbyDictErr]=useState("");
  const pollRef=useRef(null);

  useEffect(()=>{
    if(screen!=="game"||!roomCode)return;
    const poll=async()=>{
      const res=await loadGame(roomCode);
      if(res.ok&&res.data&&!res.data.waiting){
        const normalised=normaliseGame(res.data);
        if(normalised&&normalised.players&&normalised.players.length>=2){
          setGame(normalised);
        }
      }
    };
    poll();pollRef.current=setInterval(poll,2000);
    return()=>clearInterval(pollRef.current);
  },[screen,roomCode]);

  useEffect(()=>{
    setStaged([]);setSelTile(null);setDef1("");setDef2("");setExample("");
    setGameErr("");setRealWarn("");setShowXch(false);setXchSel([]);setAnalysis(null);
  },[game?.turn,game?.phase]);

  useEffect(()=>{
    if(!game||!staged.length){setAnalysis(null);return;}
    setAnalysis(analysePlay(game.board,staged));
  },[staged,game]);

  const createRoom=async()=>{
    if(!playerName.trim()){setLobbyErr("Enter your name");return;}
    // Exclude O/0 and I/1 from room codes to avoid confusion
    const SAFE_CHARS='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code='';while(code.length<4)code+=SAFE_CHARS[Math.floor(Math.random()*SAFE_CHARS.length)];
    setDebug(`Creating room ${code}…`);
    const res=await saveGame(code,{waiting:true,p1name:playerName.trim()});
    setDebug(`PUT crom-${code} → status=${res.status} ok=${res.ok}${res.err?" err="+res.err:""}`);
    if(!res.ok){setLobbyErr(`Firebase write failed (${res.status})${res.err?" — "+res.err:""}`);return;}
    setRoomCode(code);setPidx(0);setScreen("waiting");
  };

  const joinRoom=async()=>{
    if(!playerName.trim()){setLobbyErr("Enter your name");return;}
    if(!roomCode.trim()){setLobbyErr("Enter room code");return;}
    setJoining(true);
    const code=roomCode.toUpperCase();
    const name=playerName.trim();
    setDebug(`GET crom-${code}…`);
    const res=await loadGame(code);
    setDebug(`GET crom-${code} → status=${res.status} ok=${res.ok} data=${JSON.stringify(res.data)}`);
    if(!res.ok||res.data===null){setLobbyErr(`Room not found (HTTP ${res.status})`);setJoining(false);return;}

    // Re-entry: game in progress, name matches an existing player
    if(!res.data.waiting){
      const normalised=normaliseGame(res.data);
      if(normalised?.players?.length>=2){
        const idx=normalised.players.findIndex(p=>p.name===name);
        if(idx===-1){setLobbyErr("Room is full");setJoining(false);return;}
        setGame(normalised);setPidx(idx);setRoomCode(code);setScreen("game");setJoining(false);
        return;
      }
      setLobbyErr("Game already started");setJoining(false);return;
    }

    // Re-entry: still in waiting room, name matches player 1
    if(res.data.p1name===name){
      setRoomCode(code);setPidx(0);setScreen("waiting");setJoining(false);
      return;
    }

    // Normal join as player 2
    const gs=createGame(res.data.p1name,name);
    const wr=await saveGame(code,gs);
    setDebug(`PUT game → status=${wr.status} ok=${wr.ok}${wr.err?" err="+wr.err:""}`);
    if(!wr.ok){setLobbyErr(`Failed to save game (${wr.status})`);setJoining(false);return;}
    // Verify the written state is fully formed before entering game screen
    if(!gs.players||gs.players.length<2){setLobbyErr("Game init error — try again");setJoining(false);return;}
    setGame(gs);setPidx(1);setRoomCode(code);setScreen("game");setJoining(false);
  };

  const lookUpDict=async()=>{
    if(!lobbyDictCode.trim()){setLobbyDictErr("Enter a room code");return;}
    const code=lobbyDictCode.toUpperCase();
    const res=await loadGame(code);
    if(!res.ok||!res.data||res.data.waiting){setLobbyDictErr("Game not found");return;}
    setLobbyDictData(toArr(res.data.dictionary)||[]);
    setLobbyDictPlayers(toArr(res.data.players)||[]);
    setLobbyDictErr("");
  };

  useEffect(()=>{
    if(screen!=="waiting")return;
    const id=setInterval(async()=>{
      const res=await loadGame(roomCode);
      if(res.ok&&res.data&&!res.data.waiting){
        const normalised=normaliseGame(res.data);
        if(normalised&&normalised.players&&normalised.players.length>=2){
          setGame(normalised);
          setScreen("game");
        }
      }
    },2000);
    return()=>clearInterval(id);
  },[screen,roomCode]);

  const myTurn=game&&pidx===game.turn&&game.phase==="playing";
  // Derived safely — computed here but only used below the !game guard
  const myRack=(game&&game.players&&game.players[pidx])?game.players[pidx].rack:[];
  const siSet=new Set(staged.map(s=>s.rackIdx));

  const clickTile=ri=>{if(!myTurn)return;setGameErr("");setSelTile(p=>p===ri?null:ri);};
  const clickCell=(r,c)=>{
    if(!myTurn)return;
    const si=staged.findIndex(s=>s.r===r&&s.c===c);
    if(si!==-1){setStaged(staged.filter((_,i)=>i!==si));setSelTile(null);return;}
    if(bget(game.board,r,c))return;
    if(selTile!==null){setStaged([...staged,{r,c,letter:myRack[selTile],rackIdx:selTile}]);setSelTile(null);}
  };

  const submitWord=async()=>{
    setGameErr("");setRealWarn("");
    if(!staged.length){setGameErr("Place tiles on the board first");return;}
    const a=analysePlay(game.board,staged);
    if(!a){setGameErr("Invalid placement — min 4 letters, no gaps, must connect, no accidental cross-words, cover centre on first move");return;}
    const{effectiveWord,squareType,crossedWord,score}=a;
    if(!pronounceable(effectiveWord)){setGameErr(`"${effectiveWord}" isn't pronounceable`);return;}
    if(squareType==='dm'){
      if(wcount(def1)<3){setGameErr("First definition must be at least 3 words");return;}
      if(wcount(def2)<3){setGameErr("Second definition must be at least 3 words");return;}
    }else if(squareType==='ac'){
      // Each letter of the word must be the initial of a word in the definition
      const defWords=def1.trim().split(/\s+/).filter(Boolean);
      const initials=defWords.map(w=>w[0].toUpperCase());
      const wordLetters=[...effectiveWord.toUpperCase()];
      let iIdx=0;
      for(const letter of wordLetters){
        while(iIdx<initials.length&&initials[iIdx]!==letter)iIdx++;
        if(iIdx>=initials.length){setGameErr(`Acronym definition: each letter of "${effectiveWord}" must begin a word in your definition (in order). Missing: ${letter}`);return;}
        iIdx++;
      }
    }else{
      if(wcount(def1)<3){setGameErr("Definition must be at least 3 words");return;}
    }
    if(!example.trim()){setGameErr("Add an example sentence");return;}
    const wordForCheck=squareType==='cw'&&crossedWord?`${crossedWord.word}-${effectiveWord}`:effectiveWord;
    if(!wordInSentence(effectiveWord,example)&&!wordInSentence(wordForCheck,example)){
      setGameErr(`Example sentence must contain "${effectiveWord}"${squareType==='cw'&&crossedWord?` or "${wordForCheck}"`:"" }`);return;
    }
    const real=await checkRealWord(effectiveWord);
    if(real){setRealWarn(`"${effectiveWord}" may be a real word`);if(!window.confirm(`"${effectiveWord}" looks real. Submit anyway?`))return;}
    setSubmitting(true);
    const fresh=await loadGame(roomCode);
    if(!fresh.ok){setGameErr("Sync error — try again");setSubmitting(false);return;}
    const freshData=normaliseGame(fresh.data);
    if(!freshData?.players?.[pidx]){setGameErr("Sync error — try again");setSubmitting(false);return;}
    const nr=[...freshData.players[pidx].rack];
    for(const idx of[...staged.map(s=>s.rackIdx)].sort((a,b)=>b-a))nr.splice(idx,1);
    const np=freshData.players.map((p,i)=>i===pidx?{...p,rack:nr}:p);
    const upd={
      ...freshData,players:np,phase:"pendingApproval",
      pending:{
        playerId:pidx,word:effectiveWord,
        compoundWord:squareType==='cw'&&crossedWord?`${crossedWord.word}-${effectiveWord}`:null,
        crossedWord:crossedWord||null,
        definition:def1.trim(),definition2:squareType==='dm'?def2.trim():null,
        example:example.trim(),tiles:staged.map(({r,c,letter})=>({r,c,letter})),
        squareType,score,scoreBreakdown:a.scoreBreakdown
      }
    };
    await saveGame(roomCode,upd);setGame(normaliseGame(upd));setSubmitting(false);
  };

  const approveWord=async()=>{
    const fresh=await loadGame(roomCode);if(!fresh.ok)return;
    const freshData=normaliseGame(fresh.data);
    const pd=freshData.pending;
    if(!pd||!pd.tiles||!pd.word){setGameErr("Pending play missing — try refreshing");return;}
    // Build new board safely — guard against missing rows
    const nb=Array.from({length:SZ},(_,r)=>Array.from({length:SZ},(_,c)=>bget(freshData.board,r,c)));
    for(const{r,c,letter}of pd.tiles)nb[r][c]={letter,definition:pd.definition};
    const{drawn,remaining}=drawTiles(freshData.bag,Math.min(pd.tiles.length,freshData.bag.length));
    const np=freshData.players.map((p,i)=>i===pd.playerId?{...p,rack:[...(Array.isArray(p.rack)?p.rack:[]),...drawn],score:p.score+pd.score}:p);
    const displayWord=pd.compoundWord||pd.word;
    const nt=1-pd.playerId;
    let phase="playing",winner=null;
    if(np[pd.playerId]&&(np[pd.playerId].rack||[]).length===0&&remaining.length===0){phase="gameOver";const sc=np.map(p=>p.score);winner=sc[0]>sc[1]?0:sc[1]>sc[0]?1:-1;}

    const dictEntry={
      word:pd.word,compoundWord:pd.compoundWord||null,
      crossedWord:pd.crossedWord||null,
      definition:pd.definition,definition2:pd.definition2||null,
      example:pd.example,squareType:pd.squareType||null,
      playedBy:pd.playerId,score:pd.score,
      turnNumber:(freshData.dictionary||[]).length+1
    };
    const newDict=[...(freshData.dictionary||[]),dictEntry];

    const upd={...freshData,board:nb,bag:remaining,players:np,phase,winner,
      turn:phase==="playing"?nt:freshData.turn,pending:null,dictionary:newDict,
      log:[...freshData.log,{text:`${np[pd.playerId].name} played "${displayWord}" (+${pd.score}pts)`}]};
    await saveGame(roomCode,upd);setGame(normaliseGame(upd));
  };

  const rejectWord=async()=>{
    const fresh=await loadGame(roomCode);if(!fresh.ok)return;
    const freshData=normaliseGame(fresh.data);
    const pd=freshData.pending;
    if(!pd||!pd.tiles||!pd.word){return;}
    const np=freshData.players.map((p,i)=>i===pd.playerId?{...p,rack:[...(Array.isArray(p.rack)?p.rack:[]),...pd.tiles.map(t=>t.letter)]}:p);
    const upd={...freshData,players:np,phase:"playing",pending:null,
      log:[...freshData.log,{text:`${freshData.players?.[pd.playerId]?.name||"Player"}'s "${pd.compoundWord||pd.word}" was rejected`}]};
    await saveGame(roomCode,upd);setGame(normaliseGame(upd));
  };

  const doExchange=async()=>{
    if(!xchSel.length)return;
    if(game.bag.length<7){setGameErr("Not enough tiles in bag");return;}
    const fresh=await loadGame(roomCode);if(!fresh.ok)return;
    const freshData=normaliseGame(fresh.data);
    if(!freshData?.players?.[pidx])return;
    if(freshData.players[pidx].usedExchange){setGameErr("Already used your exchange");setShowXch(false);return;}
    const rc=[...freshData.players[pidx].rack];
    const ret=xchSel.map(i=>rc[i]);
    for(const i of[...xchSel].sort((a,b)=>b-a))rc.splice(i,1);
    const{drawn,remaining:bag2}=drawTiles(freshData.bag,ret.length);
    rc.push(...drawn);
    const nb=[...bag2,...ret].sort(()=>Math.random()-0.5);
    const np=freshData.players.map((p,i)=>i===pidx?{...p,rack:rc,usedExchange:true}:p);
    const upd={...freshData,players:np,bag:nb,turn:1-pidx,phase:"playing",pending:null,
      log:[...freshData.log,{text:`${freshData.players[pidx].name} exchanged ${ret.length} tile${ret.length!==1?"s":""}`}]};
    await saveGame(roomCode,upd);setGame(normaliseGame(upd));setShowXch(false);setXchSel([]);
  };

  const forfeit=async()=>{
    if(!window.confirm("Forfeit? Can't be undone."))return;
    const fresh=await loadGame(roomCode);
    const base=normaliseGame((fresh.ok&&fresh.data&&!fresh.data.waiting)?fresh.data:game);
    const upd={...base,phase:"gameOver",winner:1-pidx,pending:null,
      log:[...(base.log||[]),{text:`${base.players?.[pidx]?.name||"Player"} forfeited`}]};
    await saveGame(roomCode,upd);setGame(normaliseGame(upd));
  };

  // ── Lobby ─────────────────────────────────────────────────────────────────
  if(screen==="lobby")return(
    <div className="app">
      {showDict&&lobbyDictData&&<DictionaryPanel dictionary={lobbyDictData} players={lobbyDictPlayers} onClose={()=>{setShowDict(false);setLobbyDictData(null);}}/>}
      <div className="title">Cromulent Scrabble</div>
      <div className="subtitle">words that sound real · aren't</div>
      <div className="card" style={{maxWidth:380}}>
        <div className="label">Your name</div>
        <input value={playerName} onChange={e=>{setPlayerName(e.target.value);setLobbyErr("");}} placeholder="e.g. Zorgath" maxLength={20}/>
        <div className="divider"/>
        <button className="btn btn-gold" style={{width:"100%",marginBottom:10}} onClick={createRoom}>Create new game</button>
        <div className="label" style={{marginTop:12}}>Or join with room code</div>
        <div className="row">
          <input value={roomCode} onChange={e=>{setRoomCode(e.target.value.toUpperCase());setLobbyErr("");}} placeholder="XXXX" maxLength={4} style={{textTransform:"uppercase",letterSpacing:"0.2em",fontWeight:700}}/>
          <button className="btn btn-primary" onClick={joinRoom} disabled={joining}>{joining?"…":"Join"}</button>
        </div>
        {lobbyErr&&<div className="error" style={{marginTop:10}}>{lobbyErr}</div>}
        {debug&&<div className="debug">{debug}</div>}
        <div className="divider"/>
        <div style={{fontSize:"0.72rem",color:"#8892a4",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.08em"}}>Look up a past game's dictionary</div>
        <div className="row">
          <input value={lobbyDictCode} onChange={e=>{setLobbyDictCode(e.target.value.toUpperCase());setLobbyDictErr("");}} placeholder="Room code" maxLength={4} style={{textTransform:"uppercase",letterSpacing:"0.2em",fontWeight:700}}/>
          <button className="btn btn-dict" onClick={async()=>{await lookUpDict();setShowDict(true);}}>📖 View</button>
        </div>
        {lobbyDictErr&&<div className="error" style={{marginTop:8}}>{lobbyDictErr}</div>}
        <div className="divider"/>
        <div style={{fontSize:"0.73rem",color:"#8892a4",lineHeight:1.7}}>
          <strong style={{color:"#e0e0e0"}}>How to play:</strong> Invent fake words that sound English (min 4 letters, must connect). Write a definition (3+ words) and use the word in your sentence. Score = 1pt per tile placed, plus bonuses for landing on special squares.<br/>
          <strong style={{color:"#3cc864"}}>DM</strong> Double Meaning · <strong style={{color:"#00d0d0"}}>DL</strong> Double Letter · <strong style={{color:"#ffa500"}}>CW</strong> Compound Word · <strong style={{color:"#e650f0"}}>AC</strong> Acronym
        </div>
      </div>
    </div>
  );

  if(screen==="waiting")return(
    <div className="app">
      <div className="title">Cromulent Scrabble</div>
      <div className="card" style={{textAlign:"center",maxWidth:360}}>
        <div style={{fontSize:"0.85rem",color:"#8892a4",marginBottom:16}}>Share this code with your opponent:</div>
        <div style={{fontSize:"3rem",fontFamily:"'Playfair Display',serif",color:"#f5a623",letterSpacing:"0.3em",marginBottom:16}}>{roomCode}</div>
        <div style={{fontSize:"0.8rem",color:"#8892a4"}}>Waiting for them to join…</div>
        <div style={{marginTop:10,fontSize:"0.75rem",color:"#8892a4"}}>You're {playerName} · Player 1</div>
        {debug&&<div className="debug" style={{marginTop:12,textAlign:"left"}}>{debug}</div>}
      </div>
    </div>
  );

  if(!game||!game.players||game.players.length<2||!game.players[pidx]||!game.players[1-pidx]){
    return <div className="app"><div className="info">Loading game…</div></div>;
  }

  const{players,board,bag,phase,pending,turn,log,winner,dictionary}=game;
  const me=players[pidx],opp=players[1-pidx];
  const dictCount=(dictionary||[]).length;

  // ── Game over ─────────────────────────────────────────────────────────────
  if(phase==="gameOver")return(
    <div className="app">
      {showDict&&<DictionaryPanel dictionary={dictionary||[]} players={players} onClose={()=>setShowDict(false)}/>}
      <div className="card" style={{maxWidth:520}}>
        <div className="game-over">
          <div className="game-over-title">{winner===-1?"It's a tie!":winner===pidx?"You win! 🎉":`${opp.name} wins`}</div>
          <div style={{color:"#8892a4",marginBottom:16,fontSize:"0.9rem"}}>Final scores</div>
          <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:16}}>
            {players.map((p,i)=><div key={i} style={{textAlign:"center",padding:"10px 20px",background:"#16213e",borderRadius:8,border:winner===i?"2px solid #f5a623":"2px solid transparent"}}><div style={{fontSize:"0.78rem",color:"#8892a4"}}>{p.name}</div><div style={{fontSize:"2rem",fontFamily:"'Playfair Display',serif",color:"#f5a623"}}>{p.score}</div></div>)}
          </div>
          <button className="btn btn-dict" style={{width:"100%",marginBottom:14}} onClick={()=>setShowDict(true)}>
            📖 View Dictionary ({dictCount} word{dictCount!==1?"s":""})
          </button>
          <Log log={log}/>
          <div style={{marginTop:12,fontSize:"0.75rem",color:"#8892a4"}}>Room code <strong style={{color:"#e0e0e0"}}>{roomCode}</strong> — paste it in the lobby to revisit your dictionary later.</div>
        </div>
      </div>
    </div>
  );

  // ── Pending approval ──────────────────────────────────────────────────────
  if(phase==="pendingApproval"&&pending){
    const isApprover=pending.playerId!==pidx;
    const displayWord=pending.compoundWord||pending.word;
    return(
      <div className="app">
        {showDict&&<DictionaryPanel dictionary={dictionary||[]} players={players} onClose={()=>setShowDict(false)}/>}
        <div className="card" style={{maxWidth:520}}>
          <div className="row" style={{marginBottom:12}}>
            {pending.squareType&&<div className={`sq-badge ${pending.squareType}`} style={{marginBottom:0}}>
              {pending.squareType==='dm'?"⊕ Double Meaning":pending.squareType==='dl'?"✦ Double Letter":pending.squareType==='cw'?"⊞ Compound Word":"🔤 Acronym"}
            </div>}
            <span className="spacer"/>
            <button className="btn btn-dict btn-sm" onClick={()=>setShowDict(true)}>📖 {dictCount}</button>
          </div>
          <div className="sec" style={{marginTop:0}}>{isApprover?"Pending your approval":"Waiting for opponent…"}</div>
          <div className="pending-word">{displayWord}</div>
          {pending.crossedWord&&<div style={{fontSize:"0.78rem",color:"#e67e22",marginBottom:4}}>Built on: <strong>{pending.crossedWord.word}</strong>{pending.crossedWord.def?` — "${pending.crossedWord.def}"`:""}</div>}
          <div className="pending-def">"{pending.definition}"</div>
          {pending.definition2&&<div className="pending-def" style={{marginTop:2}}>Also: "{pending.definition2}"</div>}
          <div className="pending-ex" style={{marginTop:4}}>e.g. {pending.example}</div>
          <div style={{marginTop:8,fontSize:"0.8rem",color:"#8892a4"}}>
            Score: <strong style={{color:"#f5a623"}}>{pending.score} pts</strong>
            {pending.scoreBreakdown&&<span style={{color:"#8892a4",marginLeft:6,fontSize:"0.73rem"}}>({(pending.scoreBreakdown||[]).join(' · ')})</span>}
          </div>
          {isApprover&&<div className="btn-row">
            <button className="btn btn-approve" onClick={approveWord}>✓ Approve</button>
            <button className="btn btn-reject" onClick={rejectWord}>✗ Reject</button>
          </div>}
          <div className="divider"/>
          <Board board={board} staged={pending.tiles} onCell={()=>{}} pending={pending.tiles}/>
        </div>
      </div>
    );
  }

  // ── Main game view ────────────────────────────────────────────────────────
  const sq=analysis?.squareType||null;
  return(
    <div className="app">
      {showDict&&<DictionaryPanel dictionary={dictionary||[]} players={players} onClose={()=>setShowDict(false)}/>}
      <div style={{width:"100%",maxWidth:620}}>
        <div className="row" style={{marginBottom:10}}>
          <div className="title" style={{fontSize:"1.4rem",margin:0}}>Cromulent Scrabble</div>
          <span className="spacer"/>
          <button className="btn btn-dict btn-sm" onClick={()=>setShowDict(true)}>
            📖 Dictionary{dictCount>0?` (${dictCount})`:""}
          </button>
        </div>
        <div className="scoreboard">
          {players.map((p,i)=><div key={i} className={`score-card${turn===i&&phase==="playing"?" active":""}`}><div className="score-name">{p.name}{i===pidx?" (you)":""}</div><div className="score-val">{p.score}</div>{turn===i&&phase==="playing"&&<div className="score-turn">▶ their turn</div>}</div>)}
        </div>
        <div className="row" style={{marginBottom:8}}>
          <span style={{fontSize:"0.72rem",background:"#16213e",padding:"2px 8px",borderRadius:12,color:"#8892a4"}}>🎲 {bag.length} left</span>
          <span className="spacer"/>
          <span style={{fontSize:"0.75rem",color:"#8892a4"}}>Room: <strong style={{color:"#e0e0e0"}}>{roomCode}</strong></span>
        </div>
        <div className="legend">
          <div className="leg"><div className="leg-sq" style={{background:"#08200f",border:"1px solid #3cc864"}}></div>DM Double Meaning</div>
          <div className="leg"><div className="leg-sq" style={{background:"#082228",border:"1px solid #00d0d0"}}></div>DL Double Letter</div>
          <div className="leg"><div className="leg-sq" style={{background:"#1c1604",border:"1px solid #ffa500"}}></div>CW Compound Word</div>
          <div className="leg"><div className="leg-sq" style={{background:"#260828",border:"1px solid #e650f0"}}></div>AC Acronym</div>
        </div>
        <div className="board-wrap"><Board board={board} staged={staged} onCell={clickCell} pending={[]}/></div>
        <div className="sec">Your tiles</div>
        <div className="rack">
          {me.rack.map((l,i)=><button key={i} className={`tile${selTile===i?" selected":""}${siSet.has(i)?" used":""}`} onClick={()=>!siSet.has(i)&&clickTile(i)}>{l}</button>)}
          {!me.rack.length&&<span style={{color:"#8892a4",fontSize:"0.85rem"}}>No tiles</span>}
        </div>
        {myTurn&&!showXch&&<>
          {analysis&&<div style={{marginBottom:10}}>
            {sq&&<div className={`sq-badge ${sq}`} style={{marginBottom:6}}>
              {sq==='dm'?"⊕ Double Meaning square":sq==='dl'?"✦ Double Letter square":sq==='cw'?"⊞ Compound Word square":"🔤 Acronym square"}
            </div>}
            <div style={{fontSize:"0.8rem",color:"#8892a4"}}>
              Word: <strong style={{color:"#f5a623",fontSize:"1rem",letterSpacing:"0.1em"}}>{analysis.effectiveWord}</strong>
              {analysis.dlSquare&&<span style={{color:"#3498db",marginLeft:8,fontSize:"0.75rem"}}>({analysis.dlSquare.letter} doubled)</span>}
              {analysis.crossedWord&&sq==='cw'&&<span style={{color:"#e67e22",marginLeft:8,fontSize:"0.75rem"}}>→ <strong>{analysis.crossedWord.word}-{analysis.effectiveWord}</strong></span>}
            </div>
            <div style={{fontSize:"0.78rem",color:"#8892a4",marginTop:3}}>
              Score: <strong style={{color:"#f5a623"}}>{analysis.score} pts</strong>
              <span style={{marginLeft:6,fontSize:"0.72rem"}}>({(analysis.scoreBreakdown||[]).join(' · ')})</span>
            </div>
          </div>}
          {staged.length>0&&<>
            <div className="sec">Define your word</div>
            {sq==='cw'&&analysis?.crossedWord&&<div style={{background:"#1a1408",border:"1px solid #e67e22",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:"0.82rem"}}>
              <span style={{color:"#e67e22",fontWeight:600}}>Building on: </span>
              <span style={{color:"#f5a623",fontWeight:700}}>{analysis.crossedWord.word}</span>
              {analysis.crossedWord.def&&<span style={{color:"#8892a4"}}> — "{analysis.crossedWord.def}"</span>}
              <div style={{color:"#8892a4",fontSize:"0.75rem",marginTop:4}}>Your definition must extend or build on this meaning.</div>
            </div>}
            <div style={{marginBottom:8}}>
              <div className="label">{sq==='dm'?"Definition 1 (3+ words)":sq==='ac'?"Acronym definition (each letter must start a word, in order)":"Definition (3+ words)"}</div>
              <textarea value={def1} onChange={e=>setDef1(e.target.value)} placeholder={sq==='ac'?`e.g. ${(analysis?.effectiveWord||'WORD').toUpperCase().split('').join('___ ')}___…`:sq==='cw'&&analysis?.crossedWord?`Build on "${analysis.crossedWord.word}"…`:"What does it mean?"}/>
              {sq==='ac'&&analysis?.effectiveWord&&<div style={{fontSize:"0.7rem",color:"#c39bd3",marginTop:4}}>Letters to define: {analysis.effectiveWord.toUpperCase().split('').join(' · ')}</div>}
            </div>
            {sq==='dm'&&<div style={{marginBottom:8}}>
              <div className="label">Definition 2 (3+ words)</div>
              <textarea value={def2} onChange={e=>setDef2(e.target.value)} placeholder="Second meaning…"/>
            </div>}
            <div style={{marginBottom:10}}>
              <div className="label">Example sentence (must contain the word)</div>
              <textarea value={example} onChange={e=>setExample(e.target.value)} placeholder={`Use "${analysis?.effectiveWord||"your word"}" in a sentence…`} rows={2}/>
            </div>
          </>}
          {gameErr&&<div className="error">{gameErr}</div>}
          {realWarn&&<div className="warning">{realWarn}</div>}
          <div className="btn-row">
            {staged.length>0&&<><button className="btn btn-primary" onClick={submitWord} disabled={submitting}>{submitting?"Submitting…":"Submit word"}</button><button className="btn btn-ghost" onClick={()=>{setStaged([]);setSelTile(null);}}>Clear</button></>}
            {staged.length===0&&<>{!me.usedExchange&&<button className="btn btn-ghost" onClick={()=>setShowXch(true)}>Exchange tiles</button>}<button className="btn btn-ghost btn-sm" style={{color:"#e94560"}} onClick={forfeit}>Forfeit</button></>}
          </div>
          {staged.length===0&&<div style={{fontSize:"0.75rem",color:"#8892a4",marginTop:8}}>Tap a tile then tap a board cell to place it.{me.usedExchange?" (Exchange used)":""}</div>}
        </>}
        {myTurn&&showXch&&<div className="card" style={{marginTop:10}}>
          <div className="sec" style={{marginTop:0}}>Exchange tiles (uses your turn)</div>
          <div className="rack">{me.rack.map((l,i)=><button key={i} className={`tile${xchSel.includes(i)?" selected":""}`} onClick={()=>setXchSel(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i])}>{l}</button>)}</div>
          <div className="btn-row">
            <button className="btn btn-primary" onClick={doExchange} disabled={!xchSel.length}>Exchange {xchSel.length>0?xchSel.length+" tile"+(xchSel.length!==1?"s":""):""}</button>
            <button className="btn btn-ghost" onClick={()=>{setShowXch(false);setXchSel([]);}}>Cancel</button>
          </div>
        </div>}
        {!myTurn&&phase==="playing"&&<div className="info" style={{marginTop:8}}>Waiting for {players[turn].name} to play…</div>}
        {log.length>0&&<><div className="sec" style={{marginTop:16}}>Game log</div><Log log={log}/></>}
      </div>
    </div>
  );
}

// ── Board ────────────────────────────────────────────────────────────────────
// Shape SVGs sit behind the label — dual-coding for colour-blind accessibility
// CW=circle · DM=hexagon · DL=square · AC=diamond
const SP_SHAPE_COL={cw:"#c87800",dm:"#1a7035",dl:"#007878",ac:"#902098"};
function SpShape({sp}){
  const col=SP_SHAPE_COL[sp];
  const s={position:"absolute",inset:0,width:"100%",height:"100%"};
  if(sp==="cw")return<svg viewBox="0 0 40 40" style={s}><circle cx="20" cy="20" r="13" fill={col}/></svg>;
  if(sp==="dm")return<svg viewBox="0 0 40 40" style={s}><polygon points="20,7 32,13.5 32,26.5 20,33 8,26.5 8,13.5" fill={col}/></svg>;
  if(sp==="dl")return<svg viewBox="0 0 40 40" style={s}><rect x="7" y="7" width="26" height="26" fill={col}/></svg>;
  if(sp==="ac")return<svg viewBox="0 0 40 40" style={s}><polygon points="20,6 34,20 20,34 6,20" fill={col}/></svg>;
  return null;
}

function Board({board,staged,onCell,pending}){
  const sm=new Map(staged.map(t=>[`${t.r},${t.c}`,t.letter]));
  const pm=new Map((pending||[]).map(t=>[`${t.r},${t.c}`,t.letter]));
  const cells=[];
  for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++){
    const k=`${r},${c}`;
    // Guard: board row may be undefined if Firebase dropped it entirely
    const row=Array.isArray(board[r])?board[r]:[];
    const bt=row[c]&&typeof row[c]==='object'&&row[c].letter?row[c]:null;
    const sl=sm.get(k),pl=pm.get(k);
    const sp=getSpecial(r,c),isCtr=r===CEN&&c===CEN;
    let cls="cell",txt="";
    if(bt){cls+=" has-tile";txt=bt.letter;}
    else if(sl){cls+=" staged";txt=sl;}
    else if(pl){cls+=" staged";txt=pl;}
    else if(isCtr)cls+=" ctr";
    else if(sp)cls+=` sp-${sp}`;
    const showShape=sp&&!bt&&!sl&&!pl;
    const label=txt||(isCtr&&!bt&&!sl&&!pl?"★":sp&&!bt&&!sl&&!pl?sp.toUpperCase():"");
    cells.push(
      <div key={k} className={cls} style={{position:"relative",overflow:"hidden"}} onClick={()=>onCell(r,c)}>
        {showShape&&<SpShape sp={sp}/>}
        <span style={{position:"relative",zIndex:1}}>{label}</span>
      </div>
    );
  }
  return <div className="board-wrap"><div className="board">{cells}</div></div>;
}

function Log({log}){
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[log]);
  return <div className="log" ref={ref}>{!log.length&&<div className="log-entry">Game started</div>}{log.map((e,i)=><div key={i} className="log-entry">{e.text}</div>)}</div>;
}

ReactDOM.render(<ErrorBoundary><App/></ErrorBoundary>,document.getElementById("root"));
</script>
</body>
</html>
